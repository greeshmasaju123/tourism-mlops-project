
name: Tourism Project Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  register-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Upload dataset to Hugging Face Hub
        env:
          HF_TOKEN: \${{ secrets.HF_TOKEN }}
        run: python model_building/register_dataset.py

  data-prep:
    needs: register-dataset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run data preparation
        env:
          HF_TOKEN: \${{ secrets.HF_TOKEN }}
        run: python model_building/data_preparation.py

  model-training:
    needs: data-prep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Model building
        env:
          HF_TOKEN: \${{ secrets.HF_TOKEN }}
        run: python model_building/model_training.py

  deploy-hosting:
    needs: [register-dataset, data-prep, model-training]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deployment dependencies
        run: pip install huggingface_hub
      - name: Push files to Hugging Face Space
        env:
          HF_TOKEN: \${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi, upload_folder

          space_id = "YOUR_HF_USERNAME/tourism-wellness-app"
          api = HfApi(token=os.environ["HF_TOKEN"])
          api.create_repo(repo_id=space_id, repo_type="space", space_sdk="streamlit", exist_ok=True)
          upload_folder(
              folder_path="deployment",
              repo_id=space_id,
              repo_type="space",
              token=os.environ["HF_TOKEN"],
          )
          PY
